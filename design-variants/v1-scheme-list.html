<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案管理 - ECL 系统</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:var(--color-bg);color:#1a1d29;line-height:1.5}
  :root{--color-primary:#6366f1;--color-primary-light:rgba(99,102,241,.12);--color-primary-dark:#818cf8;--color-success:#22c55e;--color-warning:#f59e0b;--color-danger:#ef4444;--color-bg:#0a0d14;--color-surface:#11141f;--color-surface-alt:#161b2a;--color-border:#1e2335;--color-text:#e2e8f0;--color-text-secondary:#94a3b8;--color-text-muted:#545a74;--radius-sm:6px;--radius-md:10px;--radius-lg:14px;--shadow-sm:0 1px 2px rgba(0,0,0,.2);--shadow-md:0 4px 16px rgba(0,0,0,.3);--shadow-lg:0 8px 32px rgba(0,0,0,.4)}
  .global-context{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 32px;display:flex;align-items:center;gap:24px;box-shadow:var(--shadow-sm)}
  .context-logo{font-size:16px;font-weight:700;color:#1a56db;letter-spacing:-.3px}
  .context-logo span{color:#1a1d29;font-weight:400}
  .page{max-width:1280px;margin:0 auto;padding:24px 32px}
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
  .page-header h1{font-size:22px;font-weight:600;letter-spacing:-.3px}
  .page-header .sub{font-size:14px;color:#6b7280;margin-top:4px}
  .panel{background:#fff;border-radius:10px;box-shadow:var(--shadow-sm);border:1px solid #e5e7eb;margin-bottom:20px}
  .panel-header{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
  .panel-header h2{font-size:15px;font-weight:600}
  .panel-body{padding:20px}
  .panel-body-nopad{padding:0}
  .btn-ghost{background:none;border:none;padding:6px 12px;border-radius:6px;font-size:13px;color:#6b7280;cursor:pointer}
  .btn-ghost:hover{background:var(--color-bg)}
  .btn-primary{background:#1a56db;color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer}
  .btn-primary:hover{background:#1243af}
  .btn-text{background:none;border:none;padding:4px 8px;border-radius:6px;font-size:12px;color:#6b7280;cursor:pointer}
  .btn-text:hover{color:#1a56db;background:#e8effd}
  .btn-text.danger:hover{color:#dc2626;background:#fee2e2}
  .btn-outline{background:#fff;border:1px solid #e5e7eb;padding:4px 12px;border-radius:6px;font-size:12px;color:#6b7280;cursor:pointer}
  .btn-outline:hover{border-color:#1a56db;color:#1a56db}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:12px;font-weight:600;color:#6b7280;padding:8px 12px;border-bottom:2px solid #e5e7eb;white-space:nowrap}
  td{padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px}
  tr:hover td{background:#f9fafb}
  .mono{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;font-size:12px}
  .status-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}
  .st-draft{background:#f3f4f6;color:#374151}
  .st-published{background:#dbeafe;color:#1e40af}
  .st-effective{background:#d1fae5;color:#065f46}
  .st-expired{background:#fee2e2;color:#991b1b}
  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:5000;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal-box{background:#fff;border-radius:12px;width:480px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden}
  .modal-head{padding:14px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{font-size:15px;font-weight:600}
  .modal-close{background:none;border:none;font-size:18px;color:#9ca3af;cursor:pointer;padding:4px}
  .modal-close:hover{color:#1a1d29}
  .modal-body{padding:20px}
  .modal-foot{padding:12px 20px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px}
  .form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
  .form-group label{font-size:12px;color:#6b7280;font-weight:500}
  .form-group select,.form-group input,.form-group textarea{border:1px solid #e5e7eb;border-radius:6px;padding:6px 10px;font-size:13px}
  .toast{position:fixed;bottom:24px;right:24px;background:#1a1d29;color:#e1e7ef;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}
  .empty-state{padding:40px;text-align:center;color:#9ca3af;font-size:13px}
  .filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .filter-bar select{border:1px solid #e5e7eb;border-radius:6px;padding:5px 10px;font-size:12px}

/* Enhanced components */
.panel{background:var(--color-surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--color-border);margin-bottom:20px;transition:box-shadow .2s}
.panel:hover{box-shadow:var(--shadow-md)}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--color-border);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#fafbff,#f8faff)}
.panel-header h2{font-size:14px;font-weight:600;color:var(--color-primary-dark)}
.btn-primary{background:linear-gradient(135deg,var(--color-primary),#7c3aed);color:#fff;border:none;padding:6px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(79,70,229,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(79,70,229,.3)}
.btn-ghost{background:none;border:none;padding:5px 12px;border-radius:8px;font-size:13px;color:#64748b;cursor:pointer;transition:all .12s}
.btn-ghost:hover{background:#f1f5f9;color:#0f172a}
.btn-text{background:none;border:none;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;transition:all .12s}
.btn-text:hover{color:var(--color-primary);background:var(--color-primary-light)}
.btn-text.danger:hover{color:#ef4444;background:#fef2f2}
.btn-outline{background:#fff;border:1px solid var(--color-border);padding:4px 12px;border-radius:8px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;transition:all .12s}
.btn-outline:hover{border-color:var(--color-primary);color:var(--color-primary);background:var(--color-primary-light)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:#64748b;padding:10px 12px;border-bottom:1px solid var(--color-border);text-transform:uppercase;letter-spacing:.4px;background:#f8fafc}
td{padding:11px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;transition:background .1s}
tr:hover td{background:#f8fafc}
.group-chip{padding:5px 16px;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#64748b;border:1px solid var(--color-border);display:inline-block;transition:all .15s;margin:2px 4px 2px 0;font-weight:500}
.group-chip:hover{background:var(--color-primary-light);border-color:var(--color-primary)}
.group-chip.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary);box-shadow:0 2px 8px rgba(79,70,229,.2)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--color-border);padding:0 20px;background:#f8fafc;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.tab-item{padding:8px 20px;font-size:13px;font-weight:500;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab-item:hover{color:var(--color-primary-dark);background:var(--color-primary-light)}
.tab-item.active{color:var(--color-primary);border-bottom-color:var(--color-primary);font-weight:600}
input,select,textarea{border:1px solid var(--color-border)!important;border-radius:8px!important;padding:6px 10px!important;font-size:13px!important;transition:border-color .15s,box-shadow .15s;background:#fff!important}
input:focus,select:focus,textarea:focus{border-color:var(--color-primary)!important;box-shadow:0 0 0 3px rgba(79,70,229,.1)!important;outline:none!important}

</style>
</head>
<body>
<div class="global-context"><div class="context-logo">ECL <span>减值计量系统</span></div></div>
<div class="page">
  <div class="page-header">
    <div><h1>ECL 方案管理</h1><div class="sub">管理 ECL 减值方案的生命周期：创建、复制、发布、失效</div></div>
    <div style="display:flex;gap:8px;">
      <button class="btn-ghost" style="border:1px solid #e5e7eb;" onclick="openCopyModal()">⤻ 从生效方案复制</button>
      <button class="btn-ghost" style="border:1px solid #e5e7eb;" onclick="showToast('方案对比页面')">⇄ 方案对比</button>
      <button class="btn-primary" onclick="openCreateModal()">⊕ 新建方案</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h2>方案列表</h2>
      <div class="filter-bar">
        <select id="statusFilter" onchange="render()">
          <option value="">全部状态</option>
          <option value="DRAFT">草稿</option>
          <option value="PUBLISHED">已发布</option>
          <option value="EFFECTIVE">已生效</option>
          <option value="EXPIRED">已失效</option>
        </select>
      </div>
    </div>
    <div class="panel-body-nopad">
      <table><thead><tr><th>方案编码</th><th>方案名称</th><th>版本</th><th>状态</th><th>生效日期</th><th>创建人</th><th>创建时间</th><th style="width:200px;">操作</th></tr></thead>
        <tbody id="schemeBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-head"><h3>编辑方案</h3><button class="modal-close" onclick="closeModal('editModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>方案名称</label><input id="editName" placeholder="方案名称"></div>
      <div class="form-group"><label>变更说明</label><textarea id="editDesc" rows="3"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn-ghost" onclick="closeModal('editModal')">取消</button><button class="btn-primary" onclick="confirmEdit()">保存</button></div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal-box">
    <div class="modal-head"><h3>新建方案</h3><button class="modal-close" onclick="closeModal('createModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>方案名称</label><input id="newName" placeholder="如：2026年Q3方案"></div>
      <div class="form-group"><label>变更说明</label><textarea id="newDesc" rows="3" placeholder="描述本次变更的目的"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn-ghost" onclick="closeModal('createModal')">取消</button><button class="btn-primary" onclick="confirmCreate()">创建</button></div>
  </div>
</div>

<!-- Copy Modal -->
<div class="modal-overlay" id="copyModal">
  <div class="modal-box">
    <div class="modal-head"><h3>从生效方案复制</h3><button class="modal-close" onclick="closeModal('copyModal')">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:#6b7280;margin-bottom:12px;">将基于当前生效方案复制一份全新的 DRAFT 方案。</p>
      <div class="form-group"><label>变更说明</label><textarea id="copyDesc" rows="3" placeholder="如：基于Q2方案修改PD参数"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn-ghost" onclick="closeModal('copyModal')">取消</button><button class="btn-primary" onclick="confirmCopy()">复制</button></div>
  </div>
</div>

<!-- Publish Modal -->
<div class="modal-overlay" id="publishModal">
  <div class="modal-box">
    <div class="modal-head"><h3>发布方案</h3><button class="modal-close" onclick="closeModal('publishModal')">✕</button></div>
    <div class="modal-body">
      <p id="publishInfo" style="font-size:13px;margin-bottom:12px;"></p>
      <div class="form-group"><label>生效方式</label><select id="publishMode"><option value="immediate">立即生效</option><option value="scheduled">计划生效</option></select></div>
      <div class="form-group" id="publishDateGroup" style="display:none;"><label>计划生效日期</label><input type="date" id="publishDate"></div>
    </div>
    <div class="modal-foot"><button class="btn-ghost" onclick="closeModal('publishModal')">取消</button><button class="btn-primary" onclick="confirmPublish()">发布</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let schemes = [
  { id:'s1', code:'SCH_003', name:'2026年Q3 v2.1', ver:'2.1', status:'EFFECTIVE', date:'2026-06-01', by:'张工', at:'2026-05-25 14:32', desc:'基于Q2调整PD和LGD' },
  { id:'s2', code:'SCH_002', name:'2026年Q2', ver:'2.0', status:'EXPIRED', date:'2026-03-01', by:'李工', at:'2026-02-20 09:15', desc:'季度例行更新' },
  { id:'s3', code:'SCH_004', name:'2026年Q3 v3.0 (测试)', ver:'3.0', status:'DRAFT', date:'', by:'张工', at:'2026-06-19 10:00', desc:'试算PD新模型' },
  { id:'s4', code:'SCH_001', name:'2026年Q1', ver:'1.0', status:'EXPIRED', date:'2026-01-01', by:'王工', at:'2025-12-20 14:00', desc:'初始版本' },
  { id:'s5', code:'SCH_005', name:'2026年Q3 监管报送版', ver:'1.0', status:'PUBLISHED', date:'2026-07-01', by:'张工', at:'2026-06-18 16:30', desc:'用于监管报送' }
];

const stLabels = { DRAFT:'草稿', PUBLISHED:'已发布', EFFECTIVE:'已生效', EXPIRED:'已失效' };
const stClass = { DRAFT:'st-draft', PUBLISHED:'st-published', EFFECTIVE:'st-effective', EXPIRED:'st-expired' };
let publishTargetId = null;
let editTargetId = null;

function render() {
  const filter = document.getElementById('statusFilter').value;
  let data = filter ? schemes.filter(s => s.status === filter) : schemes;
  const tbody = document.getElementById('schemeBody');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">暂无方案</div></td></tr>'; return; }
  tbody.innerHTML = data.map(s => `<tr>
    <td class="mono" style="font-weight:500;color:var(--color-primary)">${s.code}</td>
    <td style="font-weight:500;">${s.name}</td>
    <td>${s.ver}</td>
    <td><span class="status-tag ${stClass[s.status]}">${stLabels[s.status]}</span></td>
    <td>${s.date || '-'}</td>
    <td>${s.by}</td>
    <td>${s.at}</td>
    <td>
      <span class="btn-text" onclick="viewScheme('${s.id}')">查看</span>
      ${s.status === 'DRAFT' ? `<span class="btn-text" onclick="openEditModal('${s.id}')">编辑</span><span class="btn-text" onclick="openPublishModal('${s.id}')">发布</span><span class="btn-text danger" onclick="deleteScheme('${s.id}')">删除</span>` : ''}
      ${s.status === 'PUBLISHED' ? '<span style="font-size:11px;color:#9ca3af;">待生效</span>' : ''}
      ${s.status === 'EFFECTIVE' ? `<span class="btn-text" onclick="copyFrom('${s.id}')">复制</span>` : ''}
    </td>
  </tr>`).join('');
}

function viewScheme(id) {
  const s = schemes.find(x => x.id === id);
  if (s) {
    try { parent.switchToScheme(s.code, s.name, s.status); } catch(e) { showToast(`查看方案：${s.name}`); }
  }
}

function openEditModal(id) {
  editTargetId = id;
  const s = schemes.find(x => x.id === id);
  if (s) {
    document.getElementById('editName').value = s.name;
    document.getElementById('editDesc').value = s.desc || '';
  }
  openModal('editModal');
}
function confirmEdit() {
  const s = schemes.find(x => x.id === editTargetId);
  if (s) {
    s.name = document.getElementById('editName').value.trim() || s.name;
    s.desc = document.getElementById('editDesc').value.trim();
  }
  closeModal('editModal');
  render();
  showToast('方案已更新');
}

function openCreateModal() { openModal('createModal'); }
function confirmCreate() {
  const name = document.getElementById('newName').value.trim() || '新方案';
  const desc = document.getElementById('newDesc').value.trim();
  const maxCode = Math.max(...schemes.map(x => parseInt(x.code.replace('SCH_','')) || 0));
  const newCode = 'SCH_' + String(maxCode + 1).padStart(3,'0');
  schemes.push({ id:'s'+Date.now(), code:newCode, name, ver:'1.0', status:'DRAFT', date:'', by:'当前用户', at:new Date().toISOString().slice(0,16).replace('T',' '), desc });
  closeModal('createModal');
  document.getElementById('newName').value = ''; document.getElementById('newDesc').value = '';
  render(); showToast(`方案 ${newCode} 已创建`);
}

function openCopyModal() { openModal('copyModal'); }
function confirmCopy() {
  const desc = document.getElementById('copyDesc').value.trim() || '基于生效方案复制';
  const src = schemes.find(s => s.status === 'EFFECTIVE');
  if (!src) { showToast('没有已生效的方案可供复制'); closeModal('copyModal'); return; }
  const maxCode = Math.max(...schemes.map(x => parseInt(x.code.replace('SCH_','')) || 0));
  const newCode = 'SCH_' + String(maxCode + 1).padStart(3,'0');
  schemes.push({ id:'s'+Date.now(), code:newCode, name:src.name+' (复制)', ver:src.ver, status:'DRAFT', date:'', by:'当前用户', at:new Date().toISOString().slice(0,16).replace('T',' '), desc });
  closeModal('copyModal');
  document.getElementById('copyDesc').value = '';
  render(); showToast(`已从 ${src.code} 复制为 ${newCode}`);
}

function copyFrom(id) {
  const src = schemes.find(s => s.id === id);
  if (!src) return;
  const maxCode = Math.max(...schemes.map(x => parseInt(x.code.replace('SCH_','')) || 0));
  const newCode = 'SCH_' + String(maxCode + 1).padStart(3,'0');
  schemes.push({ id:'s'+Date.now(), code:newCode, name:src.name+' (复制)', ver:src.ver, status:'DRAFT', date:'', by:'当前用户', at:new Date().toISOString().slice(0,16).replace('T',' '), desc:'基于 '+src.code+' 复制' });
  render(); showToast(`已复制为 ${newCode}`);
}

function openPublishModal(id) {
  publishTargetId = id;
  const s = schemes.find(x => x.id === id);
  document.getElementById('publishInfo').textContent = `方案：${s.name}（${s.code}）`;
  openModal('publishModal');
}
function confirmPublish() {
  const s = schemes.find(x => x.id === publishTargetId);
  if (!s) return;
  const mode = document.getElementById('publishMode').value;
  s.status = mode === 'immediate' ? 'EFFECTIVE' : 'PUBLISHED';
  s.date = mode === 'immediate' ? new Date().toISOString().slice(0,10) : document.getElementById('publishDate').value || '';
  closeModal('publishModal');
  render(); showToast(`方案 ${s.code} 已${mode === 'immediate' ? '生效' : '发布'}`);
}

document.getElementById('publishMode').addEventListener('change', function() {
  document.getElementById('publishDateGroup').style.display = this.value === 'scheduled' ? 'block' : 'none';
});

function deleteScheme(id) {
  if (!confirm('确定删除此 DRAFT 方案？')) return;
  schemes = schemes.filter(x => x.id !== id);
  render(); showToast('已删除');
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

render();
</script>
<script>if(window.self!==window.top)document.documentElement.className+=' iframed'</script>
