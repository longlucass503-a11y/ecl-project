<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阶段划分配置 - ECL 系统</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:var(--color-bg);color:#1a1d29;line-height:1.5}
  :root{--color-primary:#6366f1;--color-primary-light:rgba(99,102,241,.12);--color-primary-dark:#818cf8;--color-success:#22c55e;--color-warning:#f59e0b;--color-danger:#ef4444;--color-bg:#0a0d14;--color-surface:#11141f;--color-surface-alt:#161b2a;--color-border:#1e2335;--color-text:#e2e8f0;--color-text-secondary:#94a3b8;--color-text-muted:#545a74;--radius-sm:6px;--radius-md:10px;--radius-lg:14px;--shadow-sm:0 1px 2px rgba(0,0,0,.2);--shadow-md:0 4px 16px rgba(0,0,0,.3);--shadow-lg:0 8px 32px rgba(0,0,0,.4)}
  .global-context{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 32px;display:flex;align-items:center;gap:24px;box-shadow:var(--shadow-sm);position:sticky;top:0;z-index:50}
  .context-logo{font-size:16px;font-weight:700;color:#1a56db;letter-spacing:-.3px}
  .context-logo span{color:#1a1d29;font-weight:400}
  .page{max-width:1280px;margin:0 auto;padding:24px 32px}
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
  .page-header h1{font-size:22px;font-weight:600;letter-spacing:-.3px}
  .page-header .sub{font-size:14px;color:#6b7280;margin-top:4px}
  .panel{background:#fff;border-radius:10px;box-shadow:var(--shadow-sm);border:1px solid #e5e7eb;margin-bottom:20px}
  .panel-header{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
  .panel-header h2{font-size:15px;font-weight:600}
  .panel-body{padding:20px}
  .panel-body-nopad{padding:0}
  .btn-ghost{background:none;border:none;padding:6px 12px;border-radius:6px;font-size:13px;color:#6b7280;cursor:pointer}
  .btn-ghost:hover{background:var(--color-bg)}
  .btn-primary{background:#1a56db;color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer}
  .btn-primary:hover{background:#1243af}
  .btn-text{background:none;border:none;padding:4px 8px;border-radius:6px;font-size:12px;color:#6b7280;cursor:pointer}
  .btn-text:hover{color:#1a56db;background:#e8effd}
  .btn-text.danger:hover{color:#dc2626;background:#fee2e2}
  .btn-outline{background:#fff;border:1px solid #e5e7eb;padding:4px 12px;border-radius:6px;font-size:12px;color:#6b7280;cursor:pointer}
  .btn-outline:hover{border-color:#1a56db;color:#1a56db}
  .group-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .group-chip{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#6b7280;border:1px solid #e5e7eb;transition:all .12s}
  .group-chip:hover{background:#eef0f5}
  .group-chip.active{background:#e8effd;color:#1243af;border-color:#d1ddfb;font-weight:500}
  .tabs{display:flex;gap:0;border-bottom:1px solid #e5e7eb;padding:0 20px}
  .tab-item{padding:8px 20px;font-size:13px;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
  .tab-item:hover{color:#1a1d29}
  .tab-item.active{color:#1a56db;border-bottom-color:#1a56db;font-weight:500}
  .tab-content{display:none}
  .tab-content.active{display:block}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:12px;font-weight:600;color:#6b7280;padding:8px 12px;border-bottom:2px solid #e5e7eb;white-space:nowrap}
  td{padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px}
  tr:hover td{background:#f9fafb}
  .cond-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#f3f4f6;border-radius:4px;font-size:12px;border:1px solid #e5e7eb}
  .cond-or{font-size:10px;color:#9ca3af;padding:0 4px;text-transform:uppercase;font-weight:500}
  .info-note{font-size:12px;color:#9ca3af;padding:8px 12px;border-top:1px solid #e5e7eb;background:#f9fafb}
  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal-box{background:#fff;border-radius:12px;width:680px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden}
  .modal-head{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
  .modal-head h3{font-size:15px;font-weight:600}
  .modal-close{background:none;border:none;font-size:18px;color:#9ca3af;cursor:pointer;padding:4px}
  .modal-close:hover{color:#1a1d29}
  .modal-body{padding:20px;max-height:70vh;overflow-y:auto}
  .modal-foot{padding:12px 20px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px}
  .form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
  .form-group label{font-size:12px;color:#6b7280;font-weight:500}
  .form-group select,.form-group input{border:1px solid #e5e7eb;border-radius:6px;padding:6px 10px;font-size:13px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  /* Condition editor inside modal */
  .cond-editor{border:1px solid #e5e7eb;border-radius:10px;overflow:hidden}
  .ce-header{padding:10px 14px;background:#f9fafb;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
  .ce-header span{font-size:12px;font-weight:600;color:#6b7280}
  .ce-body{padding:14px}
  .cond-block{display:flex;align-items:center;gap:8px;padding:6px 0;flex-wrap:wrap}
  .cond-block select,.cond-block input{border:1px solid #e5e7eb;border-radius:6px;padding:5px 8px;font-size:12px}
  .cond-remove{color:#9ca3af;cursor:pointer;font-size:14px;padding:2px 4px}
  .cond-remove:hover{color:#dc2626}
  .or-divider{text-align:center;padding:2px 0}
  .or-divider span{font-size:10px;color:#9ca3af;font-weight:600}
  .editor-split{display:grid;grid-template-columns:1fr 240px;gap:16px}
  .crr-batch{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f9fafb;border-radius:8px;border:1px dashed #e5e7eb;margin-top:12px;font-size:13px}
  .crr-batch input{width:50px;border:1px solid #e5e7eb;border-radius:6px;padding:4px 6px;font-size:13px;text-align:center;}
  .toast{position:fixed;bottom:24px;right:24px;background:#1a1d29;color:#e1e7ef;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}
  .empty-state{padding:40px;text-align:center;color:#9ca3af;font-size:13px}

/* Enhanced components */
.panel{background:var(--color-surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--color-border);margin-bottom:20px;transition:box-shadow .2s}
.panel:hover{box-shadow:var(--shadow-md)}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--color-border);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#fafbff,#f8faff)}
.panel-header h2{font-size:14px;font-weight:600;color:var(--color-primary-dark)}
.btn-primary{background:linear-gradient(135deg,var(--color-primary),#7c3aed);color:#fff;border:none;padding:6px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(79,70,229,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(79,70,229,.3)}
.btn-ghost{background:none;border:none;padding:5px 12px;border-radius:8px;font-size:13px;color:#64748b;cursor:pointer;transition:all .12s}
.btn-ghost:hover{background:#f1f5f9;color:#0f172a}
.btn-text{background:none;border:none;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;transition:all .12s}
.btn-text:hover{color:var(--color-primary);background:var(--color-primary-light)}
.btn-text.danger:hover{color:#ef4444;background:#fef2f2}
.btn-outline{background:#fff;border:1px solid var(--color-border);padding:4px 12px;border-radius:8px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;transition:all .12s}
.btn-outline:hover{border-color:var(--color-primary);color:var(--color-primary);background:var(--color-primary-light)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:#64748b;padding:10px 12px;border-bottom:1px solid var(--color-border);text-transform:uppercase;letter-spacing:.4px;background:#f8fafc}
td{padding:11px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;transition:background .1s}
tr:hover td{background:#f8fafc}
.group-chip{padding:5px 16px;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#64748b;border:1px solid var(--color-border);display:inline-block;transition:all .15s;margin:2px 4px 2px 0;font-weight:500}
.group-chip:hover{background:var(--color-primary-light);border-color:var(--color-primary)}
.group-chip.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary);box-shadow:0 2px 8px rgba(79,70,229,.2)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--color-border);padding:0 20px;background:#f8fafc;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.tab-item{padding:8px 20px;font-size:13px;font-weight:500;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab-item:hover{color:var(--color-primary-dark);background:var(--color-primary-light)}
.tab-item.active{color:var(--color-primary);border-bottom-color:var(--color-primary);font-weight:600}
input,select,textarea{border:1px solid var(--color-border)!important;border-radius:8px!important;padding:6px 10px!important;font-size:13px!important;transition:border-color .15s,box-shadow .15s;background:#fff!important}
input:focus,select:focus,textarea:focus{border-color:var(--color-primary)!important;box-shadow:0 0 0 3px rgba(79,70,229,.1)!important;outline:none!important}

</style>
</head>
<body>
<div class="global-context"><div class="context-logo">ECL <span>减值计量系统</span></div></div>
<div class="page">
  <div class="page-header">
    <div><h1>阶段划分配置</h1><div class="sub">按风险分组配置阶段判定规则和 CRR 评级下降阈值</div></div>
    <div style="display:flex;gap:8px;">
      <button class="btn-ghost" onclick="showToast('复制规则弹窗已打开')">⊗ 复制规则</button>
      <button class="btn-primary" onclick="openRuleModal()">⊕ 新增规则</button>
    </div>
  </div>
  <div class="group-selector" id="groupSelector"></div>
  <div class="panel">
    <div class="tabs">
      <div class="tab-item active" data-tab="forward" onclick="switchTab(this)">向前判定 (FORWARD)</div>
      <div class="tab-item" data-tab="rollback" onclick="switchTab(this)">回跳校验 (ROLLBACK)</div>
      <div class="tab-item" data-tab="crr" onclick="switchTab(this)">CRR 评级阈值</div>
    </div>
    <div class="tab-content active" id="tab-forward">
      <div class="panel-body-nopad">
        <table><thead><tr><th style="width:60px;">优先级</th><th style="width:110px;">目标阶段</th><th>触发条件</th><th style="width:90px;">操作</th></tr></thead>
          <tbody id="forwardBody"></tbody>
        </table>
        <div class="info-note">引擎按优先级逐条匹配，Stage 1 为兜底规则（只读）</div>
      </div>
    </div>
    <div class="tab-content" id="tab-rollback">
      <div class="panel-body-nopad">
        <table><thead><tr><th style="width:60px;">优先级</th><th style="width:140px;">回跳路径</th><th style="width:90px;">观察期(天)</th><th>条件</th><th style="width:90px;">操作</th></tr></thead>
          <tbody id="rollbackBody"></tbody>
        </table>
      </div>
    </div>
    <div class="tab-content" id="tab-crr">
      <div class="panel-body">
        <table><thead><tr><th style="width:160px;">评级代码</th><th style="width:140px;">下降阈值</th><th style="width:80px;">操作</th></tr></thead>
          <tbody id="crrBody"></tbody>
        </table>
        <div class="crr-batch">
          <span>批量设置：所有评级下降 ≥</span>
          <input type="number" id="crrBatchVal" value="3">
          <span>级</span>
          <button class="btn-text" onclick="batchSetCrr()">应用</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Rule type/preset Modal -->
<div class="modal-overlay" id="ruleModal">
  <div class="modal-box" style="width:520px;">
    <div class="modal-head"><h3 id="ruleModalTitle">新增规则</h3><button class="modal-close" onclick="closeModal('ruleModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>规则类型</label><select id="ruleType"><option value="FORWARD">FORWARD — 前向判定</option><option value="ROLLBACK">ROLLBACK — 回滚判定</option></select></div>
        <div class="form-group"><label>优先级（数字越小越高）</label><input type="number" id="rulePriority" value="1" min="1"></div>
        <div class="form-group"><label>来源阶段</label><select id="ruleSrcStage"><option value="">（不适用）</option><option>Stage 1</option><option>Stage 2</option><option>Stage 3</option></select></div>
        <div class="form-group"><label>目标阶段</label><select id="ruleTgtStage"><option>Stage 2</option><option>Stage 3</option><option>Stage 1</option></select></div>
        <div class="form-group"><label>观察期（天，ROLLBACK 时）</label><input type="number" id="ruleObsDays" value="" min="0"></div>
      </div>
      <div style="font-size:12px;color:#6b7280;">保存后将在弹出的条件编辑器中配置详细触发条件</div>
    </div>
    <div class="modal-foot"><button class="btn-ghost" onclick="closeModal('ruleModal')">取消</button><button class="btn-primary" onclick="confirmAddRule()">保存并配置条件</button></div>
  </div>
</div>

<!-- Condition Editor Modal -->
<div class="modal-overlay" id="editorModal">
  <div class="modal-box" style="width:740px;">
    <div class="modal-head">
      <h3 id="editorTitle">编辑条件</h3>
      <span style="font-size:12px;color:#9ca3af" id="editorSubtitle"></span>
      <button class="modal-close" onclick="closeModal('editorModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="editor-split">
        <div>
          <div class="cond-editor">
            <div class="ce-header">
              <span id="conditionLogicLabel">条件列表</span>
              <button class="btn-text" onclick="addCondition()">＋ 添加条件</button>
            </div>
            <div class="ce-body" id="conditionList"></div>
          </div>
        </div>
        <div>
          <div style="background:#f9fafb;border-radius:10px;padding:14px;font-size:12px;">
            <div style="font-weight:600;margin-bottom:8px;">JSON 预览</div>
            <pre id="jsonPreview" style="background:#1a1d29;color:#e1e7ef;padding:10px;border-radius:6px;font-size:11px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;min-height:140px;"></pre>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost" onclick="closeModal('editorModal')" style="padding:6px 20px;">取消</button>
      <button class="btn-primary" onclick="saveEditorRule()" style="padding:6px 20px;">保存条件</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const stageData = {
  'GRP_001': {
    forward: [
      { id: 'f1', priority: 1, target: 'Stage 3', conditions: [{ type: '逾期天数', op: 'gte', val: 91 }, { type: '五级分类', op: 'in', vals: ['次级','可疑','损失'] }, { type: '违约标识', op: 'eq', val: '是' }] },
      { id: 'f2', priority: 2, target: 'Stage 2', conditions: [{ type: '逾期天数', op: 'gte', val: 31 }, { type: 'CRR 评级下降', op: 'gte', val: '阈值' }, { type: '五级分类', op: 'eq', val: '关注' }] },
      { id: 'f_default', priority: 99, target: 'Stage 1', conditions: [], readOnly: true }
    ],
    rollback: [
      { id: 'r1', priority: 1, src: 'Stage 3', target: 'Stage 2', obsDays: 180, conditions: [{ type: '还款状态', op: 'eq', val: '正常' }, { type: '逾期状态', op: 'eq', val: '已消除' }] }
    ],
    crrThresholds: { 'CRR 1': 5, 'CRR 2': 5, 'CRR 3': 4, 'CRR 4': 4, 'CRR 5': 3, 'CRR 6': 3, 'CRR 7': 2, 'CRR 8': 2 }
  },
  'GRP_002': {
    forward: [
      { id: 'f3', priority: 1, target: 'Stage 3', conditions: [{ type: '逾期天数', op: 'gte', val: 91 }, { type: '违约标识', op: 'eq', val: '是' }] },
      { id: 'f_default2', priority: 99, target: 'Stage 1', conditions: [], readOnly: true }
    ],
    rollback: [
      { id: 'r3', priority: 1, src: 'Stage 3', target: 'Stage 2', obsDays: 180, conditions: [{ type: '逾期状态', op: 'eq', val: '已消除' }] }
    ],
    crrThresholds: { 'CRR 1': 4, 'CRR 2': 4, 'CRR 3': 3, 'CRR 4': 3, 'CRR 5': 2, 'CRR 6': 2, 'CRR 7': 1, 'CRR 8': 1 }
  },
  'GRP_003': {
    forward: [
      { id: 'f5', priority: 1, target: 'Stage 3', conditions: [{ type: '违约标识', op: 'eq', val: '是' }] },
      { id: 'f_default3', priority: 99, target: 'Stage 1', conditions: [], readOnly: true }
    ],
    rollback: [],
    crrThresholds: { 'CRR 1': 5, 'CRR 2': 5, 'CRR 3': 4, 'CRR 4': 4, 'CRR 5': 3, 'CRR 6': 3, 'CRR 7': 2, 'CRR 8': 2 }
  },
  'GRP_004': {
    forward: [
      { id: 'f6', priority: 1, target: 'Stage 3', conditions: [{ type: '逾期天数', op: 'gte', val: 91 }] },
      { id: 'f_default4', priority: 99, target: 'Stage 1', conditions: [], readOnly: true }
    ],
    rollback: [],
    crrThresholds: { 'CRR 1': 5, 'CRR 2': 5, 'CRR 3': 4, 'CRR 4': 4, 'CRR 5': 3, 'CRR 6': 3, 'CRR 7': 2, 'CRR 8': 2 }
  },
  'GRP_005': {
    forward: [
      { id: 'f7', priority: 1, target: 'Stage 3', conditions: [{ type: '逾期天数', op: 'gte', val: 61 }, { type: '违约标识', op: 'eq', val: '是' }] },
      { id: 'f_default5', priority: 99, target: 'Stage 1', conditions: [], readOnly: true }
    ],
    rollback: [],
    crrThresholds: { 'CRR 1': 3, 'CRR 2': 3, 'CRR 3': 2, 'CRR 4': 2, 'CRR 5': 1, 'CRR 6': 1, 'CRR 7': 1, 'CRR 8': 1 }
  }
};

const groups = ['GRP_001','GRP_002','GRP_003','GRP_004','GRP_005'];
const groupNames = { 'GRP_001':'对公业务','GRP_002':'非银金融','GRP_003':'银行同业','GRP_004':'债券业务','GRP_005':'供应链小微' };
let currentGroup = 'GRP_001';
let editingRuleId = null;
let editingTab = 'forward';
let conditions = [];

function renderGroups() {
  document.getElementById('groupSelector').innerHTML = groups.map(g =>
    `<div class="group-chip ${g === currentGroup ? 'active' : ''}" onclick="switchGroup('${g}')">${groupNames[g]}</div>`
  ).join('');
}
function switchGroup(g) { currentGroup = g; renderGroups(); renderAll(); }
function renderAll() { renderForward(); renderRollback(); renderCrr(); }

function renderForward() {
  const data = stageData[currentGroup].forward.sort((a,b) => a.priority - b.priority);
  const tbody = document.getElementById('forwardBody');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state">暂无规则</div></td></tr>'; return; }
  tbody.innerHTML = data.map(r => {
    const condHtml = r.readOnly ? '<span style="color:#9ca3af;font-size:12px;">兜底 — 未命中以上规则的借据</span>'
      : r.conditions.map((c,i) => {
          let text = c.type === '逾期天数' ? `逾期 ${c.op === 'gte' ? '≥' : '≤'} ${c.val} 天`
            : c.type === '五级分类' ? `五级分类 ∈ {${(c.vals||[]).join(', ')}}`
            : c.type === '违约标识' ? `违约标识 = ${c.val}`
            : c.type === 'CRR 评级下降' ? `CRR 下降 ≥ ${c.val}` : c.type;
          return `<span class="cond-chip">${text}</span>${i < r.conditions.length-1 ? '<span class="cond-or">或</span>' : ''}`;
        }).join('');
    const stageColor = r.target === 'Stage 3' ? '#dbeafe,#93c5fd,#1e40af' : r.target === 'Stage 2' ? '#fef3c7,#fcd34d,#92400e' : '#f3f4f6,#e5e7eb,#6b7280';
    return `<tr><td><strong>${r.priority}</strong></td>
      <td><span class="cond-chip" style="background:${stageColor.split(',')[0]};border-color:${stageColor.split(',')[1]};color:${stageColor.split(',')[2]};">${r.target}</span></td>
      <td>${condHtml}</td>
      <td>${r.readOnly ? '<span style="font-size:12px;color:#9ca3af;">只读</span>' : `<button class="btn-text" onclick="openEditor('forward','${r.id}')">编辑</button><button class="btn-text danger" onclick="deleteRule('forward','${r.id}')">删除</button>`}</td></tr>`;
  }).join('');
}

function renderRollback() {
  const data = stageData[currentGroup].rollback.sort((a,b) => a.priority - b.priority);
  document.getElementById('rollbackBody').innerHTML = data.length
    ? data.map(r => `<tr><td><strong>${r.priority}</strong></td><td>${r.src} → ${r.target}</td><td>${r.obsDays || '-'}</td>
      <td>${r.conditions.map((c,i) => `<span class="cond-chip">${c.type} = ${c.val}</span>${i < r.conditions.length-1 ? '<span style="font-size:10px;color:#9ca3af;"> 且 </span>' : ''}`).join('')}</td>
      <td><button class="btn-text" onclick="openEditor('rollback','${r.id}')">编辑</button><button class="btn-text danger" onclick="deleteRule('rollback','${r.id}')">删除</button></td></tr>`).join('')
    : '<tr><td colspan="5"><div class="empty-state">暂无回跳规则</div></td></tr>';
}

function renderCrr() {
  const th = stageData[currentGroup].crrThresholds;
  document.getElementById('crrBody').innerHTML = Object.entries(th).map(([k,v]) =>
    `<tr><td style="font-weight:500;">${k}</td>
      <td><span style="font-weight:600;color:#1a56db;">≥ ${v} 级</span></td>
      <td><button class="btn-text" onclick="editCrr('${k}')">编辑</button></td></tr>`
  ).join('');
}

function editCrr(label) {
  const v = prompt(`请输入「${label}」的下降阈值（级数）：`, stageData[currentGroup].crrThresholds[label]);
  if (v !== null && !isNaN(v) && parseInt(v) > 0) {
    stageData[currentGroup].crrThresholds[label] = parseInt(v);
    renderCrr();
    showToast('阈值已更新');
  }
}

function batchSetCrr() {
  const v = parseInt(document.getElementById('crrBatchVal').value);
  if (v > 0) {
    Object.keys(stageData[currentGroup].crrThresholds).forEach(k => stageData[currentGroup].crrThresholds[k] = v);
    renderCrr();
    showToast(`所有评级阈值已设为 ≥ ${v} 级`);
  }
}

function switchTab(el) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + el.dataset.tab).classList.add('active');
  editingTab = el.dataset.tab;
}

// ─── Rule Modal ───
function openRuleModal() {
  document.getElementById('rulePriority').value = '1';
  document.getElementById('ruleSrcStage').value = '';
  document.getElementById('ruleTgtStage').value = 'Stage 2';
  document.getElementById('ruleObsDays').value = '';
  document.getElementById('ruleType').value = 'FORWARD';
  openModal('ruleModal');
}

function confirmAddRule() {
  const type = document.getElementById('ruleType').value;
  const priority = parseInt(document.getElementById('rulePriority').value) || 1;
  const src = document.getElementById('ruleSrcStage').value;
  const target = document.getElementById('ruleTgtStage').value;
  const obsDays = parseInt(document.getElementById('ruleObsDays').value) || 0;
  const id = (type === 'FORWARD' ? 'f' : 'r') + Date.now().toString(36);
  const rule = { id, priority, conditions: [] };
  if (type === 'FORWARD') { rule.target = target; stageData[currentGroup].forward.push(rule); }
  else { rule.src = src || 'Stage 3'; rule.target = target; if (obsDays) rule.obsDays = obsDays; stageData[currentGroup].rollback.push(rule); }
  closeModal('ruleModal');
  renderAll();
  openEditor(type === 'FORWARD' ? 'forward' : 'rollback', id);
}

function deleteRule(tab, id) {
  if (!confirm('确定删除这条规则？')) return;
  const arr = tab === 'forward' ? stageData[currentGroup].forward : stageData[currentGroup].rollback;
  const idx = arr.findIndex(r => r.id === id);
  if (idx > -1) arr.splice(idx, 1);
  renderAll();
  showToast('规则已删除');
}

// ─── Condition Editor Modal ───
function openEditor(tab, ruleId) {
  editingRuleId = ruleId;
  editingTab = tab;
  const arr = tab === 'forward' ? stageData[currentGroup].forward : stageData[currentGroup].rollback;
  const rule = arr.find(r => r.id === ruleId);
  if (!rule) return;

  document.getElementById('editorTitle').textContent = tab === 'forward' ? '编辑条件 — 向前判定' : '编辑条件 — 回跳校验';
  document.getElementById('editorSubtitle').textContent = `${groupNames[currentGroup]} · 优先级 ${rule.priority} · ${tab === 'forward' ? '任一满足 (OR)' : '全部满足 (AND)'}`;
  document.getElementById('conditionLogicLabel').textContent = tab === 'forward' ? '条件列表 · 逻辑：任一满足 (OR)' : '条件列表 · 逻辑：全部满足 (AND)';
  conditions = rule.conditions.length > 0 ? JSON.parse(JSON.stringify(rule.conditions)) : [{ type: '逾期天数', op: 'gte', val: '' }];
  renderConditions();
  openModal('editorModal');
}

function renderConditions() {
  const container = document.getElementById('conditionList');
  const isForward = editingTab === 'forward';
  const typeOptions = ['逾期天数','五级分类','CRR 评级下降','违约标识','还款状态','逾期状态','舆情事件'];
  container.innerHTML = conditions.map((c, i) => {
    const opts = typeOptions.map(t => `<option ${c.type === t ? 'selected' : ''}>${t}</option>`).join('');
    let inputHtml = '';
    if (c.type === '逾期天数')
      inputHtml = `<select style="width:60px;" onchange="updateCond(${i},'op',this.value)"><option ${c.op==='gte'?'selected':''}>≥</option><option ${c.op==='lte'?'selected':''}>≤</option></select>
        <input type="number" value="${c.val||''}" style="width:60px;" onchange="updateCond(${i},'val',this.value)"><span style="font-size:12px;color:#6b7280;">天</span>`;
    else if (c.type === '五级分类') {
      const allV = ['正常','关注','次级','可疑','损失'];
      inputHtml = `<select style="width:70px;" onchange="updateCond(${i},'op',this.value)"><option ${c.op==='in'?'selected':''}>属于</option><option ${c.op==='not_in'?'selected':''}>不属于</option></select>
        ${allV.map(v => `<label style="font-size:12px;"><input type="checkbox" ${(c.vals||[]).includes(v)?'checked':''} onchange="toggleVals(${i},'${v}')"> ${v}</label>`).join(' ')}`;
    } else if (c.type === '违约标识')
      inputHtml = `<select style="width:60px;" onchange="updateCond(${i},'val',this.value)"><option ${c.val==='是'?'selected':''}>是</option><option ${c.val==='否'?'selected':''}>否</option></select>`;
    else if (c.type === 'CRR 评级下降')
      inputHtml = `<input value="${c.val||''}" placeholder="级数" style="width:60px;" onchange="updateCond(${i},'val',this.value)"><span style="font-size:12px;color:#6b7280;">级</span>`;
    else if (c.type === '还款状态')
      inputHtml = `<select style="width:100px;" onchange="updateCond(${i},'val',this.value)"><option ${c.val==='正常'?'selected':''}>正常还本付息</option><option ${c.val==='逾期'?'selected':''}>逾期</option></select>`;
    else if (c.type === '逾期状态')
      inputHtml = `<select style="width:80px;" onchange="updateCond(${i},'val',this.value)"><option ${c.val==='已消除'?'selected':''}>已消除</option><option ${c.val==='未消除'?'selected':''}>未消除</option></select>`;
    else
      inputHtml = `<input value="${c.val||''}" style="border:1px solid #e5e7eb;border-radius:6px;padding:5px 8px;font-size:12px;" onchange="updateCond(${i},'val',this.value)">`;

    const joinLabel = isForward ? '或' : '且';
    return `<div class="cond-block"><select style="width:110px;" onchange="changeCondType(${i},this.value)">${opts}</select>${inputHtml}
      <span class="cond-remove" onclick="removeCondition(${i})">✕</span></div>
      ${i < conditions.length-1 ? `<div class="or-divider"><span>${joinLabel}</span></div>` : ''}`;
  }).join('');
  updateJsonPreview();
}

function addCondition() { conditions.push({ type: '逾期天数', op: 'gte', val: '' }); renderConditions(); }
function removeCondition(i) { if (conditions.length <= 1) { showToast('至少保留一个条件'); return; } conditions.splice(i,1); renderConditions(); }
function updateCond(i, k, v) { conditions[i][k] = v; updateJsonPreview(); }
function toggleVals(i, v) { if (!conditions[i].vals) conditions[i].vals = []; const idx = conditions[i].vals.indexOf(v); idx > -1 ? conditions[i].vals.splice(idx,1) : conditions[i].vals.push(v); updateJsonPreview(); }
function changeCondType(i, t) { conditions[i] = { type: t, op: 'eq', val: '' }; renderConditions(); }

function updateJsonPreview() {
  const json = { logic: editingTab === 'forward' ? 'OR' : 'AND', conditions: conditions.map(c => {
    const obj = { type: c.type };
    if (c.type === '逾期天数') { obj.operator = c.op; obj.value = parseInt(c.val) || 0; }
    else if (c.type === '五级分类') { obj.operator = c.op; obj.values = c.vals || []; }
    else if (c.type === '违约标识') { obj.operator = 'eq'; obj.value = c.val === '是'; }
    else { obj.operator = c.op || 'eq'; obj.value = c.val; }
    return obj;
  })};
  document.getElementById('jsonPreview').textContent = JSON.stringify(json, null, 2);
}

function saveEditorRule() {
  const arr = editingTab === 'forward' ? stageData[currentGroup].forward : stageData[currentGroup].rollback;
  const rule = arr.find(r => r.id === editingRuleId);
  if (rule) rule.conditions = JSON.parse(JSON.stringify(conditions));
  renderAll();
  closeModal('editorModal');
  showToast('条件已保存');
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
renderGroups(); renderAll();
</script>
