<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECL 减值计量系统</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:#0a0d14;color:#e2e8f0;line-height:1.5;min-height:100vh}
:root{--color-primary:#6366f1;--color-primary-light:rgba(99,102,241,.12);--color-primary-dark:#818cf8;--color-success:#22c55e;--color-warning:#f59e0b;--color-danger:#ef4444;--color-bg:#0a0d14;--color-surface:#11141f;--color-surface-alt:#161b2a;--color-border:#1e2335;--color-text:#e2e8f0;--color-text-secondary:#94a3b8;--color-text-muted:#545a74;--radius-sm:6px;--radius-md:10px;--radius-lg:14px;--shadow-sm:0 1px 2px rgba(0,0,0,.2);--shadow-md:0 4px 16px rgba(0,0,0,.3);--shadow-lg:0 8px 32px rgba(0,0,0,.4)}
.app-shell{display:flex;flex-direction:column;height:100vh}
.top-header{background:rgba(17,20,31,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--color-border);flex-shrink:0;z-index:100}
.header-inner{max-width:1440px;margin:0 auto;padding:0 32px;display:flex;align-items:center;height:56px;gap:2px}
.header-logo{font-size:18px;font-weight:700;margin-right:24px;white-space:nowrap;letter-spacing:-.3px;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-logo span{-webkit-text-fill-color:#e2e8f0;font-weight:400}
.nav-item{padding:7px 16px;font-size:13px;font-weight:500;color:#94a3b8;cursor:pointer;border-radius:8px;white-space:nowrap;transition:all .15s}
.nav-item:hover{background:var(--color-primary-light);color:var(--color-primary-dark)}
.nav-item.active{background:var(--color-primary-light);color:var(--color-primary-dark);font-weight:600}
.main-layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:228px;background:var(--color-surface);border-right:1px solid var(--color-border);display:none;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar.show{display:flex}
.sidebar-scheme{padding:16px;border-bottom:1px solid var(--color-border)}
.sidebar-scheme .ss-code{font-size:11px;color:var(--color-text-muted)}
.sidebar-scheme .ss-name{font-size:15px;font-weight:700;margin-top:2px;color:var(--color-text)}
.sidebar-scheme .ss-status{font-size:10px;padding:2px 10px;border-radius:20px;display:inline-block;margin-top:4px;font-weight:600}
.sidebar-nav{flex:1;padding:8px 0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;font-weight:500;color:#94a3b8;cursor:pointer;border-left:2px solid transparent;transition:all .12s;margin:1px 0;border-radius:0 6px 6px 0}
.sidebar-item:hover{background:var(--color-primary-light);color:var(--color-primary-dark)}
.sidebar-item.active{background:var(--color-primary-light);color:var(--color-primary-dark);border-left-color:var(--color-primary);font-weight:600}
.content-area{flex:1;overflow:hidden;background:var(--color-bg)}
.content-area iframe{width:100%;height:100%;border:none;display:none;background:var(--color-bg)}
.content-area iframe.active{display:block}
</style>
</head>
<body>
<div class="app-shell">
  <div class="top-header">
    <div class="header-inner">
      <div class="header-logo">ECL <span>减值计量系统</span></div>
      <div class="nav-item active" onclick="switchGlobal('dashboard')" data-page="dashboard">跑批监控</div>
      <div class="nav-item" onclick="switchGlobal('scheme-list')" data-page="scheme-list">方案列表</div>
      <div class="nav-item" onclick="switchGlobal('trial')" data-page="trial">试算中心</div>
    </div>
  </div>
  <div class="main-layout">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-scheme">
        <div class="ss-code" id="ssCode">SCH_003</div>
        <div class="ss-name" id="ssName">2026年Q3 v2.1</div>
        <span class="ss-status" id="ssStatus">● 已生效</span>
      </div>
      <div class="sidebar-nav">
        <div class="sidebar-item active" data-sp="overview" onclick="switchSchemePage('overview')"><span style="width:18px;text-align:center;font-size:13px;">◉</span> 方案总览</div>
        <div class="sidebar-item" data-sp="risk-group" onclick="switchSchemePage('risk-group')"><span style="width:18px;text-align:center;">📊</span> 风险分组</div>
        <div class="sidebar-item" data-sp="stage" onclick="switchSchemePage('stage')"><span style="width:18px;text-align:center;">🧩</span> 阶段划分</div>
        <div class="sidebar-item" data-sp="pd" onclick="switchSchemePage('pd')"><span style="width:18px;text-align:center;">📈</span> PD 参数</div>
        <div class="sidebar-item" data-sp="lgd" onclick="switchSchemePage('lgd')"><span style="width:18px;text-align:center;">📉</span> LGD 参数</div>
        <div class="sidebar-item" data-sp="ccf" onclick="switchSchemePage('ccf')"><span style="width:18px;text-align:center;">📐</span> CCF 参数</div>
        <div class="sidebar-item" data-sp="overlay" onclick="switchSchemePage('overlay')"><span style="width:18px;text-align:center;">🛡️</span> 管理层叠加</div>
      </div>
    </div>
    <div class="content-area" id="contentArea">
      <iframe src="v1-clean-professional.html" class="active" id="cf-dashboard"></iframe>
      <iframe src="v1-scheme-list.html" id="cf-scheme-list"></iframe>
      <iframe src="v1-scheme-overview.html" id="cf-overview"></iframe>
      <iframe src="v1-risk-group-config.html" id="cf-risk-group"></iframe>
      <iframe src="v1-stage-config.html" id="cf-stage"></iframe>
      <iframe src="v1-pd-config.html" id="cf-pd"></iframe>
      <iframe src="v1-lgd-config.html" id="cf-lgd"></iframe>
      <iframe src="v1-ccf-config.html" id="cf-ccf"></iframe>
      <iframe src="v1-overlay-config.html" id="cf-overlay"></iframe>
      <iframe src="v1-trial-center.html" id="cf-trial"></iframe>
    </div>
  </div>
</div>
<script>
function switchGlobal(p){document.getElementById('sidebar').classList.remove('show');document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));const n=document.querySelector(`.nav-item[data-page="${p}"]`);if(n)n.classList.add('active');showFrame(p==='scheme-list'?'scheme-list':p==='overview'?'overview':p==='dashboard'?'dashboard':p==='trial'?'trial':p)}
function enterScheme(c,n,s){document.getElementById('ssCode').textContent=c;document.getElementById('ssName').textContent=n;const b=document.getElementById('ssStatus');const m={'EFFECTIVE':['rgba(34,197,94,.15)','#22c55e'],'DRAFT':['rgba(148,163,184,.15)','#94a3b8'],'PUBLISHED':['rgba(99,102,241,.15)','#818cf8'],'EXPIRED':['rgba(239,68,68,.15)','#ef4444']};const cl=m[s]||m.EFFECTIVE;b.style.background=cl[0];b.style.color=cl[1];b.textContent=s==='EFFECTIVE'?'● 已生效':s==='DRAFT'?'● 草稿':s==='PUBLISHED'?'● 已发布':'● 已失效';document.getElementById('sidebar').classList.add('show');switchSchemePage('overview')}
function switchSchemePage(p){document.querySelectorAll('.sidebar-item').forEach(s=>s.classList.remove('active'));const i=document.querySelector(`.sidebar-item[data-sp="${p}"]`);if(i)i.classList.add('active');document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));const s=document.querySelector('.nav-item[data-page="scheme-list"]');if(s)s.classList.add('active');showFrame(p)}
function showFrame(n){document.querySelectorAll('#contentArea iframe').forEach(f=>f.classList.remove('active'));const f=document.getElementById('cf-'+n);if(f)f.classList.add('active')}
window.switchToScheme=(c,n,s)=>enterScheme(c,n,s);window.switchToParam=p=>switchSchemePage(p);
</script>
</body>
</html>
