spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecl?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:ecl_user}
    password: ${DB_PASSWORD}
  h2:
    console:
      enabled: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
logging:
  level:
    com.bank.ecl: INFO
    org.mybatis: WARN

ecl:
  db-type: MYSQL
