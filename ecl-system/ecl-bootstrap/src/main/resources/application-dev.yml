spring:
  datasource:
    url: jdbc:h2:mem:ecl;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
logging:
  level:
    com.bank.ecl: DEBUG
    org.mybatis: DEBUG

ecl:
  db-type: H2
