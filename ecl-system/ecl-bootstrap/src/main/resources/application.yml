spring:
  application:
    name: ecl-system
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/ecl?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  h2:
    console:
      enabled: true
      path: /h2-console
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
server:
  port: 8080
logging:
  level:
    com.bank.ecl: DEBUG
    org.mybatis: DEBUG
# DB type for MyBatis-Plus pagination: H2 (dev/test) / MYSQL (production)
ecl:
  db-type: MYSQL
